<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Retro Boom Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-base: #0a0a0a;
            --bg-elevated: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-muted: #888888;
            --border: #333333;
        }

        body {
            font-family: 'Barlow', sans-serif;
            font-weight: 300;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Header */
        .site-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .site-header a {
            font-family: 'Monoton', cursive;
            font-size: 1.1rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            transition: color 0.2s;
        }

        .site-header a:hover {
            color: var(--text-primary);
        }

        /* Main */
        .blog-main {
            max-width: 720px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .blog-main h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3rem;
        }

        /* Post list */
        .post-item {
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
        }

        .post-item:first-child {
            padding-top: 0;
        }

        .post-date {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 400;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .post-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .post-title a:hover {
            color: var(--text-muted);
        }

        .post-excerpt {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Footer */
        footer {
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--text-muted);
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<header class="site-header">
    <a href="/">Retro Boom Games</a>
</header>

<main class="blog-main">
    <h1>Blog</h1>

    <!-- TODO: Replace placeholder with first real post -->
    <article class="post-item">
        <div class="post-date">Coming Soon</div>
        <h2 class="post-title"><a href="hail-of-fire-design-diary.html">Hail of Fire: Design Diary</a></h2>
        <p class="post-excerpt">Ten years of development, hundreds of playtests, and a dozen convention awards. The first in a series on how Hail of Fire came to be.</p>
    </article>

</main>

<footer>
    <a href="/">Home</a>
    <a href="#">Discord</a> <!-- TODO: Discord invite URL -->
    <a href="https://www.wargamevault.com/en/product/188181/hail-of-fire">WargameVault</a>
</footer>

</body>
</html>
