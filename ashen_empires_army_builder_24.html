let rulesOpen = false;

function toggleRules() {
  rulesOpen = !rulesOpen;
  const overlay = document.getElementById('rules-modal');
  const btn = document.getElementById('rules-toggle-btn');
  if (rulesOpen) {
    overlay.classList.add('open');
    btn.style.background = 'var(--red)';
    btn.style.borderColor = 'var(--red)';
    btn.style.color = 'white';
    renderRulesNav();
    renderRulesChapter(rulesActiveCh);
  } else {
    overlay.classList.remove('open');
    btn.style.background = 'var(--faint)';
    btn.style.borderColor = 'var(--navy4)';
    btn.style.color = 'var(--mist)';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('rules-modal').addEventListener('click', function(e) {
    if (e.target === this) toggleRules();
  });
});

function renderRulesNav() {
  document.getElementById('rules-nav').innerHTML = RULES_CHAPTERS.map(ch =>
    `<button class="cat-btn ${rulesActiveCh === ch.id ? 'active' : ''}" onclick="renderRulesChapter('${ch.id}')">${ch.label}</button>`
  ).join('');
}

function renderRulesChapter(id) {
  rulesActiveCh = id;
  renderRulesNav();
  // Evaluate template literals that reference ABILITIES
  let html = RULES_CONTENT[id];
  // The abilities tables use template literal expressions — eval them
  html = html.replace(/\$\{([^}]+)\}/g, (_, expr) => {
    try { return eval(expr); } catch(e) { return ''; }
  });
  document.getElementById('rules-body').innerHTML = html;
  document.getElementById('rules-body').scrollTop = 0;
}


// COLLAPSE PANELS
// ══════════════════════════════════════════════════════

function toggleLeft() {
  document.getElementById('layout').classList.toggle('left-collapsed');
}

function toggleRight() {
  document.getElementById('layout').classList.toggle('right-collapsed');
}

// ══════════════════════════════════════════════════════
// ABILITIES MODAL
// ══════════════════════════════════════════════════════

let modalUnitId = null;
let modalActiveCat = 'All';

function openAbilitiesModal(unitId) {
  modalUnitId = unitId;
  modalActiveCat = 'All';
  const unit = findUnit(unitId);
  if (!unit) return;
  renderModalCats(unit);
  renderModalGrid(unit);
  document.getElementById('abilities-modal').classList.add('open');
}

function closeAbilitiesModal() {
  document.getElementById('abilities-modal').classList.remove('open');
  modalUnitId = null;
  render();
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('abilities-modal').addEventListener('click', function(e) {
    if (e.target === this) closeAbilitiesModal();
  });
});

function renderModalCats(unit) {
  const isCommander = unit.isCommander;
  const relevantAbilities = isCommander ? ABILITIES : ABILITIES.filter(a => !a.commanderOnly);
  const usedCats = ['All', ...ABILITY_CATS.filter(cat => relevantAbilities.some(a => a.cat === cat))];
  document.getElementById('modal-cats').innerHTML = usedCats.map(cat =>
    `<button class="cat-btn ${modalActiveCat === cat ? 'active' : ''}" onclick="setModalCat('${cat}')">${cat}</button>`
  ).join('');
}

function setModalCat(cat) {
  modalActiveCat = cat;
  const unit = findUnit(modalUnitId);
  if (unit) { renderModalCats(unit); renderModalGrid(unit); }
}

function renderModalGrid(unit) {
  const isCommander = unit.isCommander;
  const relevantAbilities = (isCommander ? ABILITIES : ABILITIES.filter(a => !a.commanderOnly))
    .filter(a => modalActiveCat === 'All' || a.cat === modalActiveCat);
  document.getElementById('modal-unit-name').textContent = unit.name + ' — Abilities';
  document.getElementById('modal-unit-pts').textContent =
    unit.abilities.length + ' selected · ' + abilityCost(unit) + 'pts';
  document.getElementById('modal-ability-grid').innerHTML = relevantAbilities.map(a => `
    <div class="modal-ability-card ${unit.abilities.includes(a.name) ? 'selected' : ''}"
      onclick="modalToggleAbility('${a.name.replace(/'/g, "\\'")}')">
      <div class="modal-ability-check">${unit.abilities.includes(a.name) ? '&#10003;' : ''}</div>
      <div class="modal-ability-info">
        <div class="modal-ability-top">
          <span class="modal-ability-name">${esc(a.name)}</span>
          <span class="modal-ability-cost">${a.cost}pts</span>
        </div>
        <div class="modal-ability-desc">${a.desc}</div>
      </div>
    </div>
  `).join('');
}

function modalToggleAbility(abilityName) {
  if (!modalUnitId) return;
  const unit = findUnit(modalUnitId);
  if (!unit) return;
  if (unit.abilities.includes(abilityName)) {
    unit.abilities = unit.abilities.filter(a => a !== abilityName);
  } else {
    unit.abilities.push(abilityName);
  }
  renderModalGrid(unit);
  const badge = document.querySelector('#unit-' + unit.id + ' .unit-pts-badge');
  if (badge) badge.innerHTML = unitCost(unit) + ' <span class="pts-label">pts</span>';
  document.getElementById('total-pts-display').innerHTML = totalArmyPts() + ' <span>pts</span>';
}

// INIT
// ══════════════════════════════════════════════════════
render();
</script>
