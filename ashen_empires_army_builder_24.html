<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashen Empires — Army Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #0f1923;
    --navy2:  #172030;
    --navy3:  #1e2d40;
    --navy4:  #253550;
    --red:    #c0392b;
    --red2:   #e74c3c;
    --gold:   #c8a96e;
    --mist:   #8a9bb0;
    --ink:    #d6dde8;
    --faint:  #2a3a52;
    --stripe: #192535;
    --white:  #f0f4f8;
    --green:  #27ae60;
    --amber:  #e67e22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--ink);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy2);
    border-bottom: 2px solid var(--red);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
  }
  .header-title span { color: var(--red); }
  .header-pts {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--mist);
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .pts-display {
    background: var(--faint);
    border: 1px solid var(--navy4);
    padding: 4px 14px;
    border-radius: 2px;
    color: var(--gold);
    font-size: 16px;
    font-weight: 700;
  }
  .pts-display span { color: var(--mist); font-size: 11px; font-weight: 400; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    height: calc(100vh - 56px);
    transition: grid-template-columns 0.25s ease;
  }
  .layout.left-collapsed  { grid-template-columns: 32px 1fr 320px; }
  .layout.right-collapsed { grid-template-columns: 280px 1fr 32px; }
  .layout.left-collapsed.right-collapsed { grid-template-columns: 32px 1fr 32px; }

  .collapse-btn {
    background: transparent;
    border: none;
    color: var(--mist);
    cursor: pointer;
    font-size: 13px;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .collapse-btn:hover { color: var(--white); }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--navy2);
    border-right: 1px solid var(--faint);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .sidebar-inner { display: flex; flex-direction: column; flex: 1; overflow-y: auto; min-width: 248px; }
  .sidebar-strip {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 12px;
    cursor: pointer;
  }
  .sidebar-strip span {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mist);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }
  .layout.left-collapsed .sidebar-inner { display: none; }
  .layout.left-collapsed .sidebar-strip { display: flex; }
  .sidebar-section {
    border-bottom: 1px solid var(--faint);
    padding: 14px 16px;
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 10px;
  }

  .add-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    padding: 9px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 2px;
  }
  .add-btn:hover { background: var(--red2); }
  .add-btn:disabled { opacity: 0.35; cursor: not-allowed; background: var(--navy3) !important; }
  .add-btn.secondary {
    background: var(--faint);
    margin-top: 6px;
  }
  .add-btn.secondary:hover { background: var(--navy4); }

  /* Company list */
  .company-item {
    background: var(--faint);
    border: 1px solid var(--navy4);
    border-radius: 2px;
    margin-bottom: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .company-item.active { border-color: var(--red); }
  .company-item:hover { border-color: var(--mist); }
  .company-header {
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .company-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--white);
    letter-spacing: 0.04em;
  }
  .company-name input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--mist);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    width: 120px;
    outline: none;
    padding: 1px 0;
  }
  .company-pts {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--gold);
  }
  .company-type-badge {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mist);
    padding: 1px 5px;
    border: 1px solid var(--faint);
    border-radius: 2px;
    margin-left: 4px;
  }
  .company-units-mini {
    padding: 0 10px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .mini-unit {
    font-size: 10px;
    color: var(--mist);
    background: var(--navy3);
    padding: 2px 5px;
    border-radius: 1px;
  }
  .mini-unit.commander { color: var(--gold); }

  .regiment-group { border-bottom: 1px solid var(--faint); margin-bottom: 2px; }
  .regiment-group.active-regiment { border-left: 2px solid var(--gold); }
  .regiment-group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px 4px 10px; cursor: pointer;
  }
  .regiment-group-header:hover { background: var(--navy2); }
  /* Regiment view */
  .regiment-block {
    background: var(--navy3);
    border: 1px solid var(--navy4);
    border-radius: 2px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .regiment-header {
    padding: 6px 10px;
    background: var(--navy4);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mist);
  }
  .regiment-header strong { color: var(--gold); }

  /* ── MAIN CANVAS ── */
  .main {
    overflow-y: auto;
    padding: 20px;
    background: var(--navy);
  }

  .unit-card {
    background: var(--navy2);
    border: 1px solid var(--faint);
    border-radius: 3px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .unit-card:hover { border-color: var(--navy4); }
  .unit-card.selected { border-color: var(--red); }

  .unit-card-header {
    background: var(--navy3);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    cursor: pointer;
  }
  .unit-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.05em;
    outline: none;
    flex: 1;
    transition: border-color 0.15s;
  }
  .unit-name-input:focus { border-bottom-color: var(--mist); }

  .unit-type-select {
    background: var(--faint);
    border: 1px solid var(--navy4);
    color: var(--mist);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .unit-type-select:focus { border-color: var(--mist); }

  .unit-pts-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--gold);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }
  .unit-pts-badge .pts-label { font-size: 10px; color: var(--mist); }

  .delete-btn {
    background: transparent;
    border: none;
    color: var(--mist);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .delete-btn:hover { color: var(--red2); }

  .unit-card-body {
    padding: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* Stat rows */
  .stats-section { }
  .section-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--faint);
  }

  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
    gap: 8px;
  }
  .stat-name {
    font-size: 12px;
    color: var(--mist);
    width: 110px;
    flex-shrink: 0;
  }
  .stat-controls {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .rank-btn {
    width: 20px;
    height: 20px;
    background: var(--faint);
    border: 1px solid var(--navy4);
    color: var(--ink);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    transition: background 0.1s;
    font-family: 'Share Tech Mono', monospace;
  }
  .rank-btn:hover { background: var(--navy4); }
  .rank-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .rank-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    color: var(--white);
    width: 22px;
    text-align: center;
  }
  .rank-pts {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    width: 28px;
    text-align: right;
  }

  /* Force row */
  .force-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .force-label { font-size: 12px; color: var(--mist); width: 110px; }
  .force-select {
    background: var(--faint);
    border: 1px solid var(--navy4);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 2px;
    outline: none;
  }
  .force-count {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Rank cap indicator */
  .rank-cap-bar {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--faint);
  }
  .rank-cap-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .rank-cap-label { font-size: 10px; color: var(--mist); letter-spacing: 0.08em; text-transform: uppercase; }
  .rank-cap-value { font-family: 'Share Tech Mono', monospace; font-size: 12px; }
  .rank-cap-value.ok { color: var(--green); }
  .rank-cap-value.warn { color: var(--amber); }
  .rank-cap-value.over { color: var(--red2); }
  .progress-bar {
    height: 4px;
    background: var(--faint);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.2s, background 0.2s;
  }
  .progress-fill.warn { background: var(--amber); }
  .progress-fill.over { background: var(--red2); }

  /* Abilities section */
  .abilities-section { }
  .ability-grid {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-height: 260px;
    overflow-y: auto;
  }
  .ability-item {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 4px 6px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .ability-item:hover { background: var(--faint); }
  .ability-item.selected { background: var(--navy4); }
  .ability-check {
    width: 14px;
    height: 14px;
    border: 1px solid var(--navy4);
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--gold);
    background: var(--faint);
  }
  .ability-item.selected .ability-check { background: var(--red); border-color: var(--red); color: white; }
  .ability-info { flex: 1; }
  .ability-name { font-size: 12px; font-weight: 600; color: var(--ink); }
  .ability-cost { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--gold); }
  .ability-desc { font-size: 10px; color: var(--mist); line-height: 1.3; margin-top: 1px; font-family: 'Libre Baskerville', serif; font-style: italic; }

  /* special asset toggle */
  .special-asset-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding: 6px 8px;
    background: var(--faint);
    border-radius: 2px;
    cursor: pointer;
  }
  .toggle-switch {
    width: 28px;
    height: 14px;
    background: var(--navy4);
    border-radius: 7px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--mist);
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: left 0.2s, background 0.2s;
  }
  .toggle-switch.on { background: var(--red); }
  .toggle-switch.on::after { left: 16px; background: white; }
  .toggle-label { font-size: 11px; color: var(--mist); }
  .toggle-label strong { color: var(--gold); }

  .asset-type-select {
    background: var(--faint);
    border: 1px solid var(--navy4);
    color: var(--ink);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 2px;
    outline: none;
    margin-top: 4px;
    width: 100%;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--mist);
  }
  .empty-state h3 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--navy4);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 13px; }

  /* ── INSPECTOR PANEL ── */
  .inspector {
    background: var(--navy2);
    border-left: 1px solid var(--faint);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .inspector-inner { display: flex; flex-direction: column; flex: 1; overflow-y: auto; min-width: 288px; }
  .inspector-strip {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 12px;
    cursor: pointer;
  }
  .inspector-strip span {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mist);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
  }
  .layout.right-collapsed .inspector-inner { display: none; }
  .layout.right-collapsed .inspector-strip { display: flex; }
  .inspector-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--faint);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 700;
  }
  .roster-section { padding: 14px 16px; border-bottom: 1px solid var(--faint); }
  .roster-unit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--stripe);
  }
  .roster-unit-row:last-child { border-bottom: none; }
  .roster-unit-name { color: var(--ink); flex: 1; }
  .roster-unit-name.commander { color: var(--gold); }
  .roster-unit-pts {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--mist);
    min-width: 45px;
    text-align: right;
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
    border-bottom: 1px solid var(--stripe);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { color: var(--mist); }
  .breakdown-val { font-family: 'Share Tech Mono', monospace; color: var(--gold); }

  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0 4px;
    font-weight: 700;
    font-size: 14px;
    color: var(--white);
    border-top: 1px solid var(--red);
    margin-top: 4px;
  }
  .total-val { font-family: 'Share Tech Mono', monospace; color: var(--gold); }

  /* Validation */
  .validation-list { }
  .val-item {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 4px 0;
    font-size: 11px;
    border-bottom: 1px solid var(--stripe);
  }
  .val-item:last-child { border-bottom: none; }
  .val-icon { flex-shrink: 0; margin-top: 1px; }
  .val-ok { color: var(--green); }
  .val-warn { color: var(--amber); }
  .val-err { color: var(--red2); }
  .val-text { color: var(--mist); line-height: 1.3; }

  /* Export */
  .export-btn {
    width: 100%;
    background: var(--navy3);
    border: 1px solid var(--navy4);
    color: var(--ink);
    padding: 10px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    border-radius: 2px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .export-btn:hover { background: var(--faint); border-color: var(--mist); }
  .export-btn.primary { background: var(--red); border-color: var(--red); color: white; }
  .export-btn.primary:hover { background: var(--red2); border-color: var(--red2); }

  /* ── PRINT STYLES ── */
  @media print {
    /* Hide everything except the main unit editor */
    header, .sidebar, .inspector, .modal-overlay,
    .rank-btn, .add-btn, .export-btn, .abilities-open-btn,
    .special-asset-toggle, .asset-type-select,
    .unit-card-header .delete-btn, .company-section-title { display: none !important; }

    /* Reset all colours to black on white */
    *, *::before, *::after {
      background: white !important;
      color: black !important;
      border-color: #ccc !important;
      box-shadow: none !important;
      text-shadow: none !important;
      -webkit-print-color-adjust: exact;
    }

    body { font-size: 10pt; font-family: Georgia, serif; }
    .layout { display: block; }
    .main { padding: 0; overflow: visible; }

    /* Unit cards */
    .unit-card { border: 1px solid #999 !important; margin-bottom: 10pt; break-inside: avoid; }
    .unit-card-header { border-bottom: 1px solid #999 !important; padding: 6pt 8pt; }
    .unit-name-input { font-size: 12pt; font-weight: bold; }
    .unit-pts-badge { font-size: 10pt; }
    .unit-card-body { display: flex; }

    /* Stats */
    .stat-row { border-bottom: 1px solid #eee !important; }
    .stat-label { font-size: 9pt; }
    .stat-value { font-size: 11pt; font-weight: bold; }
    .rank-track { display: none; }

    /* Selected abilities tags */
    .sel-ab-tag { border: 1px solid #999 !important; font-size: 8pt; padding: 1pt 4pt; }
    .sel-ab-tag button { display: none !important; }

    /* Section titles */
    .section-title { font-size: 8pt; font-weight: bold; letter-spacing: 0.1em; border-bottom: 1px solid #ccc !important; margin-bottom: 4pt; }

    /* Empty state / canvas header */
    .empty-state, select { display: none !important; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--navy4); }

  .tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .tag-special { background: var(--gold); color: var(--navy); font-weight: 700; }
  .tag-commander { background: var(--navy4); color: var(--gold); }

  .company-section-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
    padding: 8px 0 4px;
    margin-bottom: 4px;
  }

  select, input { color-scheme: dark; }

<body>

<header>
  <div style="display:flex;align-items:center;gap:16px;"><div class="header-title">Ashen <span>Empires</span> — Army Builder</div><button onclick="toggleRules()" id="rules-toggle-btn" style="background:var(--faint);border:1px solid var(--navy4);color:var(--mist);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;border-radius:2px;cursor:pointer;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='var(--navy4)';this.style.color='var(--ink)'" onmouseout="this.style.background='var(--faint)';this.style.color='var(--mist)'">Rules Reference</button></div>
  <div class="header-pts">
    <div class="pts-display" id="total-pts-display">0 <span>pts</span></div>

      <input id="army-name-input" style="background:transparent;border:none;border-bottom:1px solid var(--faint);color:var(--mist);font-family:'Barlow Condensed',sans-serif;font-size:13px;outline:none;width:160px;text-align:right;" placeholder="Army Name..." value="My Army">

<!-- RULES REFERENCE MODAL -->
<div class="modal-overlay" id="rules-modal" style="align-items:flex-start;padding:24px 0;">

        <div class="modal-title">Rules Reference</div>
        <div class="modal-subtitle">Ashen Empires — Playtest Document</div>
      </div>
      <button class="modal-close" onclick="toggleRules()">×</button>
    </div>
    <div class="modal-cats" id="rules-nav"></div>
    <div class="modal-body" id="rules-body" style="display:block;padding:20px 24px;font-family:'Libre Baskerville',serif;"></div>

</div>

<!-- ABILITIES MODAL -->
<div class="modal-overlay" id="abilities-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-unit-name">Special Abilities</div>
        <div class="modal-subtitle" id="modal-unit-pts"></div>
      </div>

    <div class="modal-cats" id="modal-cats"></div>

<div class="layout" id="layout">

  <!-- SIDEBAR: Structure -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-section" style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px 10px 16px;">
        <div class="sidebar-label" style="margin:0;">Companies</div>
        <button class="collapse-btn" onclick="toggleLeft()" title="Collapse">◀</button>
      </div>
      <div class="sidebar-section" style="padding-bottom:0;">

      </div>
      <div class="sidebar-section" style="padding:6px 12px 10px;">

  <!-- MAIN: Unit editor -->

  <!-- INSPECTOR: Roster + validation -->

      <div style="padding:14px 16px; margin-top:auto; border-top:1px solid var(--faint);">
        <button class="export-btn primary" onclick="printRoster()">⎙ Print Roster</button>
        <button class="export-btn" onclick="exportJSON()">↓ Save Army (JSON)</button>
        <button class="export-btn" onclick="loadJSONPrompt()">↑ Load Army (JSON)</button>
        <input type="file" id="load-file" accept=".json" style="display:none" onchange="loadJSON(this)">
      </div>

    <div class="inspector-strip" onclick="toggleRight()">
      <button class="collapse-btn" style="font-size:16px;">◀</button>
      <span>Roster</span>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════

const ABILITIES = [
  // Combat
  { name: 'Long Weapons',       cost: 2,  cat: 'Combat',    desc: '+1 Fight Dice when charging or being charged', commanderOnly: false },
  { name: 'Great Weapons',      cost: 5,  cat: 'Combat',    desc: 'Each Fight Dice attack inflicts +1 additional shock regardless of the dice result', commanderOnly: false },
  { name: 'Impetuous',          cost: 4,  cat: 'Combat',    desc: 'Must charge nearest enemy; +2 Fight Dice when charging', commanderOnly: false },
  { name: 'Berserk',            cost: 3,  cat: 'Combat',    desc: '+2 Fight Dice when this unit has 7+ shock', commanderOnly: false },
  { name: 'Heavy Charge',       cost: 3,  cat: 'Combat',    desc: '+2 Fight Dice when charging 10"+ against units with equal or less Force', commanderOnly: false },
  { name: 'Anti-Heavy',         cost: 2,  cat: 'Combat',    desc: '+1 Fight Dice vs units with Force 2+ per model in melee', commanderOnly: false },
  { name: 'Giant Slayer',       cost: 2,  cat: 'Combat',    desc: '+2 Fight Dice against Giant units', commanderOnly: false },
  { name: 'Veteran',            cost: 5,  cat: 'Combat',    desc: 'Reroll 1s in all combat rolls', commanderOnly: false },
  { name: 'Rending',            cost: 5,  cat: 'Combat',    desc: '−1 to the target number of all Fight Dice attacks', commanderOnly: false },
  // Defense & Ranged
  { name: 'Shields',            cost: 4,  cat: 'Defense',   desc: '+1 Defense vs all attacks, +2 Defense vs shooting', commanderOnly: false },
  { name: 'Camouflaged',        cost: 4,  cat: 'Defense',   desc: 'Cannot be targeted by shooting attacks at long range', commanderOnly: false },
  { name: 'Disciplined',        cost: 2,  cat: 'Defense',   desc: '+1 Defense when charged', commanderOnly: false },
  { name: 'Shield Wall',        cost: 2,  cat: 'Defense',   desc: '+1 Defense when in base contact with another Shield Wall unit', commanderOnly: false },
  { name: 'Bodyguard',          cost: 3,  cat: 'Defense',   desc: '+1 Defense when a Commander is attached', commanderOnly: false },
  { name: 'Resilient',          cost: 5,  cat: 'Defense',   desc: 'Reduce shock taken from any single attacking unit to a maximum of 3', commanderOnly: false },
  { name: 'Hardened',            cost: 4,  cat: 'Defense',   desc: 'Ignore the first shock taken each activation', commanderOnly: false },
  { name: 'Indirect Fire',      cost: 2,  cat: 'Ranged',    desc: 'May reroll hits when shooting indirect; no LoS required; cannot fire within 16"', commanderOnly: false },
  { name: 'Piercing',           cost: 5,  cat: 'Ranged',    desc: '−1 to the target number of all Shoot Dice attacks', commanderOnly: false },
  { name: 'Explosive',          cost: 4,  cat: 'Ranged',    desc: '+1 Shoot Strength; all units within 2" of target take 1 automatic shock', commanderOnly: false },
  { name: 'Massively Explosive',cost: 10, cat: 'Ranged',    desc: '+2 Shoot Strength; all units within 4" take 1 automatic shock', commanderOnly: false },
  // Movement & Morale
  { name: 'Nimble',             cost: 2,  cat: 'Movement',  desc: 'Ignore terrain movement penalties when maneuvering', commanderOnly: false },
  { name: 'Flying',             cost: 8,  cat: 'Movement',  desc: 'As Nimble; may move over impassable terrain and enemy units', commanderOnly: false },
  { name: 'Aerial',             cost: 6,  cat: 'Movement',  desc: 'Single-model units only. While airborne: as Flying; may shoot and be shot at over non-Giants; may only shoot and be shot at (no melee, cannot charge, cannot be charged by non-Flying units). When taking combat shock: make a Courage Test — failure causes the unit to become Grounded permanently (loses Aerial and all Flying benefits; cannot move; may be charged normally; may still shoot at ground level).', commanderOnly: false },
  { name: 'Ambush',             cost: 4,  cat: 'Movement',  desc: 'Deploy anywhere 12"+ from enemies after both sides deploy', commanderOnly: false },
  { name: 'Fearless',           cost: 5,  cat: 'Morale',    desc: 'May ignore Retreat results on Courage Tests', commanderOnly: false },
  { name: 'Inspiring',          cost: 8,  cat: 'Morale',    desc: 'Friendly units within 12" reroll failed Courage Tests', commanderOnly: false },
  { name: 'Terrifying',         cost: 8,  cat: 'Morale',    desc: 'Enemies within 12" suffer −1 die to Courage Tests', commanderOnly: false },
  { name: 'Mindless',           cost: 5,  cat: 'Morale',    desc: 'Immune to Terrifying, Inspiring, and Retreat results', commanderOnly: false },
  { name: 'Rallying Cry',       cost: 2,  cat: 'Support',   desc: 'When rallying, remove minimum 2 shock (Commanders only)', commanderOnly: true },
  { name: 'Loyal',              cost: 2,  cat: 'Support',   desc: 'When rallied, remove +1 additional shock', commanderOnly: false },
  { name: 'Regeneration',       cost: 5,  cat: 'Support',   desc: 'Remove 1 shock at start of each activation', commanderOnly: false },
  { name: 'Giant',              cost: 5,  cat: 'Special',   desc: '+1 Defense; shoot/be shot over non-Giants; no cover; counts full Force in melee regardless of charging', commanderOnly: false },
  { name: 'Heroic / Monstrous', cost: 3,  cat: 'Special',   desc: 'Counts full Force in melee regardless of charging', commanderOnly: false },
  { name: 'Steam Power',        cost: 5,  cat: 'Tech',      desc: 'Once per activation: +2 Fight Dice or Shoot Dice, take 1 shock; can only be rallied by Engineers', commanderOnly: false },
  { name: 'Engineer',           cost: 2,  cat: 'Tech',      desc: 'May rally Steam Power units (Commanders only)', commanderOnly: true },
  { name: 'Swift',         cost: 3,  cat: 'Stat',      desc: '+1 Move rank', commanderOnly: false },
  { name: 'Aggressive',      cost: 3,  cat: 'Stat',      desc: '+1 Fight Dice rank', commanderOnly: false },
  { name: 'Marksmen',      cost: 3,  cat: 'Stat',      desc: '+1 Shoot Dice rank', commanderOnly: false },
  { name: 'Stalwart',      cost: 3,  cat: 'Stat',      desc: '+1 Defense rank', commanderOnly: false },
  { name: 'Resolute',      cost: 3,  cat: 'Stat',      desc: '+1 Courage rank', commanderOnly: false },
  { name: 'Brutal',        cost: 3,  cat: 'Stat',      desc: '+1 Fight Strength rank', commanderOnly: false },
  { name: 'Deadly Aim', cost: 3,  cat: 'Stat',      desc: '+1 Shoot Strength rank', commanderOnly: false },
  { name: 'Extended Range',    cost: 3,  cat: 'Stat',      desc: '+1 Range rank', commanderOnly: false },
];

const ABILITY_CATS = ['Combat','Defense','Ranged','Movement','Morale','Support','Special','Tech','Stat'];

const STATS = [
  { key: 'move',      label: 'Move (2" per rank)',    max: 5 },
  { key: 'fighting',  label: 'Fight Dice',            max: 5 },
  { key: 'fStrength', label: 'Fight Strength',        max: 5 },
  { key: 'shooting',  label: 'Shoot Dice',            max: 5 },
  { key: 'sStrength', label: 'Shoot Strength',        max: 5 },
  { key: 'defense',   label: 'Defense',               max: 5 },
  { key: 'courage',   label: 'Courage',               max: 5 },
  { key: 'range',     label: 'Range (6" per rank)',   max: 5 },
];

const FORCE_TYPES = [
  { label: 'Infantry (1 Force)', force: 1, maxModels: 10 },
  { label: 'Cavalry / Large (2 Force)', force: 2, maxModels: 5 },
  { label: 'Hero / Creature (3 Force)', force: 3, maxModels: 1 },
];

const ASSET_TYPES = [
  { label: 'Artillery',         bonus: 'Giant (free) · +2 Shoot Dice · +1 Shoot Strength' },
  { label: 'Monstrous Creature',bonus: 'Giant (free) · +2 Fight Dice · +1 Fight Strength' },
  { label: 'Colossal Machine',  bonus: 'Giant (free) · +2 Defense · single-model only' },
];

const COMPANY_TYPES = [
  { label: 'Standard', bonus: '—', restriction: '—' },
  { label: 'Assault',  bonus: '+1 Fight Die when charging', restriction: 'Must charge enemies within 12" if no friendly closer' },
  { label: 'Guard',    bonus: 'All units gain Loyal free', restriction: 'Units must stay within 12" of any Commander' },
  { label: 'Rifle',    bonus: 'No long-range shooting penalty', restriction: 'All units need 12"+ Range; max 2 Defense ranks' },
  { label: 'Scout',    bonus: 'All units gain Ambush free', restriction: 'No unit may have more than 3 total Force' },
  { label: 'Engineering', bonus: 'Up to 3 Special Assets', restriction: 'All must be Steam Powered Colossal Machines; need Engineer Commander' },
];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════

let state = {
  armyName: 'My Army',
  regiments: [],
  companies: [],
  activeCompanyId: null,
  activeRegimentId: null,
};

let nextId = 1;
const uid = () => `id${nextId++}`;

function newUnit(isCommander = false) {
  return {
    id: uid(),
    name: isCommander ? 'Captain' : 'Unit',
    isCommander,
    commanderType: isCommander ? 'Captain' : null,
    forceType: 0,
    models: 1,
    stats: { move:0, fighting:0, shooting:0, defense:0, courage:0, fStrength:0, sStrength:0, range:0 },
    abilities: [],
    isSpecialAsset: false,
    assetType: 0,
  };
}

function newRegiment() {
  return { id: uid(), name: `Regiment ${state.regiments.length + 1}` };
}

function newCompany(regimentId) {
  const regCompanies = state.companies.filter(c => c.regimentId === regimentId);
  return {
    id: uid(),
    name: `Company ${state.companies.length + 1}`,
    type: 0,
    units: [],
    regimentId: regimentId,
  };
}

// ══════════════════════════════════════════════════════
// COST CALCULATIONS
// ══════════════════════════════════════════════════════

function statCost(unit) {
  return Object.values(unit.stats).reduce((s, v) => s + v * 1, 0);
}

function forceCost(unit) {
  const ft = FORCE_TYPES[unit.forceType];
  return ft.force * unit.models;
}

function abilityCost(unit) {
  return unit.abilities.reduce((s, name) => {
    const a = ABILITIES.find(x => x.name === name);
    return s + (a ? a.cost : 0);
  }, 0);
}

function commanderBase(unit) {
  if (!unit.isCommander) return 0;
  return unit.commanderType === 'General' ? 30 : 15;
}

function specialAssetFee(unit) {
  return unit.isSpecialAsset ? 10 : 0;
}

function unitCost(unit) {
  return commanderBase(unit) + forceCost(unit) + statCost(unit) + abilityCost(unit) + specialAssetFee(unit);
}

function totalRanks(unit) {
  return Object.values(unit.stats).reduce((s, v) => s + v, 0);
}

function rankCap(unit) {
  return unit.isSpecialAsset ? 20 : 16;
}

function totalArmyPts() {
  return state.companies.reduce((s, c) => s + c.units.reduce((t, u) => t + unitCost(u), 0), 0);
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════

function sortState() {
  const alpha = (a, b) => a.name.localeCompare(b.name);
  state.regiments.sort(alpha);
  state.companies.sort(alpha);
  state.companies.forEach(c => {
    c.units.sort((a, b) => {
      // Commanders first, then alpha by name
      if (a.isCommander !== b.isCommander) return a.isCommander ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
  });
}

function render() {
  sortState();
  document.getElementById('army-name-input').value = state.armyName;
  document.getElementById('total-pts-display').innerHTML = `${totalArmyPts()} <span>pts</span>`;
  renderSidebar();
  renderMainCanvas();
  renderInspector();
}

function renderSidebar() {
  const regList = document.getElementById('regiment-list');
  regList.innerHTML = '';

  // Update add-company button state
  const addCompBtn = document.getElementById('add-company-btn');
  if (addCompBtn) {
    const canAdd = state.activeRegimentId &&
      state.companies.filter(c => c.regimentId === state.activeRegimentId).length < 3;
    addCompBtn.disabled = !canAdd;
    addCompBtn.title = !state.activeRegimentId ? 'Add a regiment first'
      : !canAdd ? 'Regiment full (max 3 companies)' : '';
  }

  if (state.regiments.length === 0) {
    const empty = document.createElement('div');

          <button class="delete-btn" onclick="event.stopPropagation();deleteRegiment('${regiment.id}')" title="Delete regiment">×</button>

            <input value="${esc(company.name)}" onclick="event.stopPropagation()"
              onchange="renameCompany('${company.id}', this.value)"

function buildUnitCard(unit, company) {
  const card = document.createElement('div');
  card.className = 'unit-card';
  card.id = `unit-${unit.id}`;

  const ft = FORCE_TYPES[unit.forceType];
  const ranks = totalRanks(unit);
  const cap = rankCap(unit);
  const pct = Math.min(100, (ranks / cap) * 100);
  const capClass = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : 'ok';
  const pts = unitCost(unit);

  // Filter abilities for commander-only
  const relevantAbilities = unit.isCommander ? ABILITIES : ABILITIES.filter(a => !a.commanderOnly);

  card.innerHTML = `
    <div class="unit-card-header">
      <input class="unit-name-input" value="${esc(unit.name)}"
        onchange="updateUnitField('${unit.id}', 'name', this.value)">
      ${unit.isCommander ? `
        <select class="unit-type-select" onchange="updateCommanderType('${unit.id}', this.value)">
          <option value="Captain" ${unit.commanderType === 'Captain' ? 'selected' : ''}>Captain</option>
          <option value="General" ${unit.commanderType === 'General' ? 'selected' : ''}>General</option>
        </select>
      ` : `
        <select class="unit-type-select" onchange="updateUnitForceType('${unit.id}', this.value)">
          ${FORCE_TYPES.map((ft, i) => `<option value="${i}" ${unit.forceType === i ? 'selected' : ''}>${ft.label}</option>`).join('')}
        </select>
      `}
      <div class="unit-pts-badge">${pts} <span class="pts-label">pts</span></div>
      <button class="delete-btn" onclick="duplicateUnit('${company.id}', '${unit.id}')" title="Duplicate unit" style="font-size:13px;">⧉</button>
      <button class="delete-btn" onclick="deleteUnit('${company.id}', '${unit.id}')" title="Delete unit">×</button>
    </div>
    <div class="unit-card-body">
      <div class="stats-section">
        <div class="section-title">Stats &amp; Force</div>
        ${unit.isCommander ? '' : `
          <div class="force-row">
            <div class="force-label">Models</div>
            <div class="force-count">
              <button class="rank-btn" onclick="changeModels('${unit.id}', -1)" ${unit.models <= 1 ? 'disabled' : ''}>−</button>
              <span class="rank-value">${unit.models}</span>
              <button class="rank-btn" onclick="changeModels('${unit.id}', 1)" ${unit.models >= ft.maxModels ? 'disabled' : ''}>+</button>
              <span style="font-size:11px;color:var(--mist);margin-left:4px;">${ft.force * unit.models} Force · ${forceCost(unit)}pts</span>
            </div>
          </div>
        `}
        ${STATS.map(s => `
          <div class="stat-row">
            <span class="stat-name">${s.label}</span>
            <div class="stat-controls">
              <button class="rank-btn" onclick="changeStat('${unit.id}', '${s.key}', -1)" ${unit.stats[s.key] <= 0 ? 'disabled' : ''}>−</button>
              <span class="rank-value">${unit.stats[s.key]}</span>
              <button class="rank-btn" onclick="changeStat('${unit.id}', '${s.key}', 1)"
                ${unit.stats[s.key] >= s.max || ranks >= cap ? 'disabled' : ''}>+</button>
              <span class="rank-pts">${unit.stats[s.key] * 1}p</span>
            </div>
          </div>
        `).join('')}
        <div class="rank-cap-bar">
          <div class="rank-cap-row">
            <span class="rank-cap-label">Rank Total</span>
            <span class="rank-cap-value ${capClass}">${ranks} / ${cap}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${capClass}" style="width:${pct}%"></div>
          </div>
        </div>
        ${!unit.isCommander ? `
          <div class="special-asset-toggle" onclick="toggleSpecialAsset('${unit.id}')">
            <div class="toggle-switch ${unit.isSpecialAsset ? 'on' : ''}"></div>
            <span class="toggle-label">Special Asset <strong>+10pts</strong> · raises cap to 24</span>
          </div>
          ${unit.isSpecialAsset ? `
            <select class="asset-type-select" onchange="updateUnitField('${unit.id}', 'assetType', parseInt(this.value))">
              ${ASSET_TYPES.map((a, i) => `<option value="${i}" ${unit.assetType === i ? 'selected' : ''}>${a.label}</option>`).join('')}
            </select>
            <div style="font-size:10px;color:var(--gold);margin-top:4px;font-style:italic;font-family:'Libre Baskerville',serif;">${ASSET_TYPES[unit.assetType].bonus}</div>
          ` : ''}
        ` : ''}
      </div>
      <div class="abilities-section">
        <div class="section-title">Special Abilities</div>
        <button class="abilities-open-btn" onclick="openAbilitiesModal('${unit.id}')">
          <span>Choose Abilities</span>
          <span class="ab-count">${unit.abilities.length > 0 ? unit.abilities.length + ' selected · ' + abilityCost(unit) + 'pts' : 'none'}</span>
        </button>
        <div class="selected-abilities-list">
          ${unit.abilities.map(name => {
            const a = ABILITIES.find(x => x.name === name);
            return `<div class="sel-ab-tag">${esc(name)}<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--gold);margin-left:3px;">${a ? a.cost+'p' : ''}</span><button onclick="event.stopPropagation();toggleAbility('${unit.id}','${name.replace(/'/g,"\\'")}')" title="Remove">×</button></div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;

  return card;
}

function renderValidation() {
  const vv = document.getElementById('validation-view');
  const issues = validate();

  if (issues.length === 0) {
    vv.innerHTML = '<div class="val-item"><span class="val-icon val-ok">✓</span><span class="val-text">Army is valid.</span></div>';
    return;
  }

  vv.innerHTML = issues.map(v => `
    <div class="val-item">
      <span class="val-icon ${v.type === 'error' ? 'val-err' : v.type === 'warn' ? 'val-warn' : 'val-ok'}">${v.type === 'error' ? '✕' : v.type === 'warn' ? '!' : '✓'}</span>
      <span class="val-text">${v.msg}</span>
    </div>
  `).join('');
}

function validate() {
  const issues = [];
  const allUnits = state.companies.flatMap(c => c.units);

  // Must have at least 1 Captain
  const hasCaptain = allUnits.some(u => u.isCommander && u.commanderType === 'Captain');
  if (!hasCaptain) issues.push({ type: 'error', msg: 'Army must include at least 1 Captain.' });

  // Rank caps
  allUnits.forEach(u => {
    const ranks = totalRanks(u);
    const cap = rankCap(u);
    if (ranks > cap) issues.push({ type: 'error', msg: `"${u.name}": ${ranks} ranks exceeds cap of ${cap}.` });
  });

  // Company size limits
  state.companies.forEach(c => {
    const regularSlots = c.units.filter(u => !u.isCommander && !u.isSpecialAsset).length;
    const captains = c.units.filter(u => u.isCommander && u.commanderType === 'Captain').length;
    const specials = c.units.filter(u => u.isSpecialAsset).length;

    if (regularSlots > 3) issues.push({ type: 'error', msg: `"${c.name}": companies hold max 3 units.` });
    if (captains > 1)     issues.push({ type: 'error', msg: `"${c.name}": max 1 Captain per company.` });

    // Special asset limit (Engineering allows 3, others 1)
    const maxSpecials = c.type === 5 ? 3 : 1;
    if (specials > maxSpecials) issues.push({ type: 'error', msg: `"${c.name}": max ${maxSpecials} Special Asset(s) for this company type.` });
  });

  // Regiment limits: max 3 companies per regiment, max 1 General per regiment
  state.regiments.forEach((regiment) => {
    const regCompanies = state.companies.filter(c => c.regimentId === regiment.id);
    if (regCompanies.length > 3) issues.push({ type: 'error', msg: `${regiment.name}: max 3 companies per regiment.` });
    const generals = regCompanies.flatMap(c => c.units.filter(u => u.isCommander && u.commanderType === 'General'));
    if (generals.length > 1) issues.push({ type: 'error', msg: `${regiment.name}: max 1 General per regiment.` });
  });

  // Rifle company
  state.companies.filter(c => c.type === 3).forEach(c => {
    c.units.filter(u => !u.isCommander).forEach(u => {
      if (u.stats.range < 2) issues.push({ type: 'warn', msg: `"${u.name}" in Rifle Company needs 12"+ Range (2+ ranks).` });
      if (u.stats.defense > 2) issues.push({ type: 'warn', msg: `"${u.name}" in Rifle Company: max 2 Defense ranks.` });
    });
  });

  // Scout company
  state.companies.filter(c => c.type === 4).forEach(c => {
    c.units.filter(u => !u.isCommander).forEach(u => {
      const force = FORCE_TYPES[u.forceType].force * u.models;
      if (force > 3) issues.push({ type: 'warn', msg: `"${u.name}" in Scout Company: max 3 total Force.` });
    });
  });

  // Aerial requires single model
  allUnits.forEach(u => {
    if (u.abilities.includes('Aerial') && u.models > 1) {
      issues.push({ type: 'error', msg: `"${u.name}": Aerial requires single-model unit.` });
    }
  });

  // No units = info
  if (allUnits.length === 0) issues.push({ type: 'warn', msg: 'Add units to build your army.' });

  return issues;
}

// ══════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════

function addRegiment() {
  const r = newRegiment();
  state.regiments.push(r);
  state.activeRegimentId = r.id;
  render();
}

function addCompany() {
  // Must have a regiment first
  if (!state.activeRegimentId) return;
  const reg = state.regiments.find(r => r.id === state.activeRegimentId);
  if (!reg) return;
  const regCompanies = state.companies.filter(c => c.regimentId === state.activeRegimentId);
  if (regCompanies.length >= 3) return; // regiment full
  const c = newCompany(state.activeRegimentId);
  state.companies.push(c);
  state.activeCompanyId = c.id;
  render();
}

function deleteCompany(id) {
  if (!confirm('Delete this company and all its units?')) return;
  state.companies = state.companies.filter(c => c.id !== id);
  if (state.activeCompanyId === id) state.activeCompanyId = state.companies[0]?.id || null;
  render();
}

function deleteRegiment(id) {
  const hasCompanies = state.companies.some(c => c.regimentId === id);
  if (hasCompanies && !confirm('Delete this regiment and all its companies and units?')) return;
  state.companies = state.companies.filter(c => c.regimentId !== id);
  state.regiments = state.regiments.filter(r => r.id !== id);
  if (state.activeRegimentId === id) {
    state.activeRegimentId = state.regiments[0]?.id || null;
    state.activeCompanyId = state.companies[0]?.id || null;
  }
  render();
}

function selectCompany(id) {
  state.activeCompanyId = id;
  render();
}

function selectRegiment(id) {
  state.activeRegimentId = id;
  render();
}

function renameRegiment(id, name) {
  const r = state.regiments.find(r => r.id === id);
  if (r) r.name = name;
  render();
}

function renameCompany(id, name) {
  const c = state.companies.find(c => c.id === id);
  if (c) c.name = name;
  render();
}

function setCompanyType(id, type) {
  const c = state.companies.find(c => c.id === id);
  if (c) c.type = parseInt(type);
  render();
}

function addUnit(companyId, isCommander) {
  const c = state.companies.find(c => c.id === companyId);
  if (!c) return;
  const unit = newUnit(isCommander);
  if (!isCommander) {
    const allNames = state.companies.flatMap(co => co.units.map(u => u.name));
    const nonCommanderCount = c.units.filter(u => !u.isCommander).length;
    if (nonCommanderCount === 0) {
      unit.name = 'Unit 1';
    } else {
      unit.name = nextCopyName('Unit 1', allNames);
    }
  }
  c.units.push(unit);
  render();
}

function deleteUnit(companyId, unitId) {
  const c = state.companies.find(c => c.id === companyId);
  if (!c) return;
  c.units = c.units.filter(u => u.id !== unitId);
  render();
}

function nextCopyName(baseName, existingNames) {
  // Strip trailing number to get the root (e.g. "Swords 1" -> "Swords")
  const root = baseName.replace(/\s+\d+$/, '');
  // Find the lowest number >= 2 that doesn't already exist
  let n = 2;
  while (existingNames.includes(root + ' ' + n)) n++;
  return root + ' ' + n;
}

function duplicateUnit(companyId, unitId) {
  const c = state.companies.find(c => c.id === companyId);
  if (!c) return;
  const unit = c.units.find(u => u.id === unitId);
  if (!unit) return;
  const copy = JSON.parse(JSON.stringify(unit));
  copy.id = uid();
  const allUnitNames = state.companies.flatMap(co => co.units.map(u => u.name));
  copy.name = nextCopyName(unit.name, allUnitNames);
  const idx = c.units.findIndex(u => u.id === unitId);
  c.units.splice(idx + 1, 0, copy);
  render();
}

function duplicateCompany(id) {
  const idx = state.companies.findIndex(c => c.id === id);
  if (idx === -1) return;
  const copy = JSON.parse(JSON.stringify(state.companies[idx]));
  copy.id = uid();
  const allCompanyNames = state.companies.map(c => c.name);
  copy.name = nextCopyName(state.companies[idx].name, allCompanyNames);
  copy.units = copy.units.map(u => ({ ...u, id: uid() }));
  // keep same regimentId; place after original in the array
  state.companies.splice(idx + 1, 0, copy);
  state.activeCompanyId = copy.id;
  render();
}

function duplicateRegiment(regimentId) {
  const regCompanies = state.companies.filter(c => c.regimentId === regimentId);
  if (regCompanies.length === 0) return;
  const newReg = newRegiment();
  const allRegNames = state.regiments.map(r => r.name);
  const srcReg = state.regiments.find(r => r.id === regimentId);
  newReg.name = nextCopyName(srcReg ? srcReg.name : newReg.name, allRegNames);
  state.regiments.push(newReg);
  const copies = regCompanies.map(c => {
    const copy = JSON.parse(JSON.stringify(c));
    copy.id = uid();
    const allCompanyNamesR = state.companies.map(co => co.name);
    copy.name = nextCopyName(c.name, allCompanyNamesR);
    copy.units = copy.units.map(u => ({ ...u, id: uid() }));
    copy.regimentId = newReg.id;
    return copy;
  });
  state.companies.push(...copies);
  state.activeRegimentId = newReg.id;
  state.activeCompanyId = copies[0].id;
  render();
}

function updateUnitField(unitId, field, value) {
  const unit = findUnit(unitId);
  if (!unit) return;
  unit[field] = value;
  render();
}

function updateCommanderType(unitId, value) {
  const unit = findUnit(unitId);
  if (!unit) return;
  // Auto-rename if name is still a default commander name
  const defaultNames = ['Captain', 'General'];
  if (defaultNames.includes(unit.name)) {
    unit.name = value; // set to 'Captain' or 'General'
  }
  unit.commanderType = value;
  render();
}

function updateUnitForceType(unitId, value) {
  const unit = findUnit(unitId);
  if (!unit) return;
  const idx = parseInt(value);
  unit.forceType = idx;
  const max = FORCE_TYPES[idx].maxModels;
  if (unit.models > max) unit.models = max;
  render();
}

function changeStat(unitId, key, delta) {
  const unit = findUnit(unitId);
  if (!unit) return;
  const s = STATS.find(s => s.key === key);
  const cap = rankCap(unit);
  const newVal = unit.stats[key] + delta;
  if (newVal < 0 || newVal > s.max) return;
  if (delta > 0 && totalRanks(unit) >= cap) return;
  unit.stats[key] = newVal;
  // Auto-link: raising Fight Dice from 0 sets Fight Strength to at least 1
  if (key === 'fighting' && delta > 0 && unit.stats.fStrength === 0) {
    if (totalRanks(unit) < cap) unit.stats.fStrength = 1;
  }
  // Auto-link: raising Shoot Dice from 0 sets Shoot Strength to at least 1
  if (key === 'shooting' && delta > 0 && unit.stats.sStrength === 0) {
    if (totalRanks(unit) < cap) unit.stats.sStrength = 1;
  }
  // Auto-link: reducing Fight Strength to 0 zeroes out Fight Dice
  if (key === 'fStrength' && newVal === 0) {
    unit.stats.fighting = 0;
  }
  // Auto-link: reducing Shoot Strength to 0 zeroes out Shoot Dice
  if (key === 'sStrength' && newVal === 0) {
    unit.stats.shooting = 0;
  }
  render();
}

function changeModels(unitId, delta) {
  const unit = findUnit(unitId);
  if (!unit) return;
  const ft = FORCE_TYPES[unit.forceType];
  const newVal = unit.models + delta;
  if (newVal < 1 || newVal > ft.maxModels) return;
  unit.models = newVal;
  render();
}

function toggleAbility(unitId, abilityName) {
  const unit = findUnit(unitId);
  if (!unit) return;
  if (unit.abilities.includes(abilityName)) {
    unit.abilities = unit.abilities.filter(a => a !== abilityName);
  } else {
    unit.abilities.push(abilityName);
  }
  render();
}

function toggleSpecialAsset(unitId) {
  const unit = findUnit(unitId);
  if (!unit) return;
  unit.isSpecialAsset = !unit.isSpecialAsset;
  render();
}

function findUnit(id) {
  for (const c of state.companies) {
    const u = c.units.find(u => u.id === id);
    if (u) return u;
  }
  return null;
}

function exportJSON() {
  const data = JSON.stringify({ armyName: state.armyName, regiments: state.regiments, companies: state.companies, nextId }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.armyName.replace(/\s+/g, '_')}.json`;
  a.click();
}

function loadJSONPrompt() {
  document.getElementById('load-file').click();
}

function loadJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      state.armyName = data.armyName || 'My Army';
      state.companies = data.companies || [];
      state.activeCompanyId = state.companies[0]?.id || null;
      nextId = data.nextId || 100;
      render();
    } catch(err) {
      alert('Could not load army: invalid JSON file.');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function printRoster() {
  const armyName = state.armyName || 'My Army';
  const total = totalArmyPts();

  // Collect all unique abilities across the whole army
  const allAbilityNames = new Set();
  state.companies.forEach(c => c.units.forEach(u => u.abilities.forEach(a => allAbilityNames.add(a))));

  const companyBlocks = state.regiments.flatMap(regiment => {
    const regCompanies = state.companies.filter(c => c.regimentId === regiment.id);
    if (regCompanies.length === 0) return [];
    const regHeader = `<div style="margin:18pt 0 4pt;font-size:13pt;font-weight:bold;letter-spacing:0.05em;border-bottom:2px solid black;">${esc(regiment.name)}</div>`;
    const blocks = regCompanies.map(company => {
    const compPts = company.units.reduce((s, u) => s + unitCost(u), 0);
    const typeName = COMPANY_TYPES[company.type].label;

    const sortedUnits = [
      ...company.units.filter(u => u.isCommander),
      ...company.units.filter(u => !u.isCommander && !u.isSpecialAsset),
      ...company.units.filter(u => u.isSpecialAsset),
    ];

    // Stat box grid: short label + value, always shown
    const STAT_GRID = [
      { key: 'move',      short: 'MOV' },
      { key: 'fighting',  short: 'Fi.Dice' },
      { key: 'fStrength', short: 'F.STR' },
      { key: 'shooting',  short: 'Sh.Dice' },
      { key: 'sStrength', short: 'S.STR' },
      { key: 'defense',   short: 'DEF' },
      { key: 'courage',   short: 'CRG' },
      { key: 'range',     short: 'RNG' },
    ];

    function statBox(u) {
      const cells = STAT_GRID.map(s => {
        const v = u.stats[s.key] || 0;
        const rng = s.key === 'range' ? (v * 6) + '"' : (s.key === 'move' ? (v * 2) + '"' : v);
        const display = v === 0 ? '—' : rng;
        return `<td class="sb${v === 0 ? ' sb-zero' : ''}">${display}<br><span class="sb-lbl">${s.short}</span></td>`;
      }).join('');
      return `<table class="stat-grid"><tr>${cells}</tr></table>`;
    }

    const unitRows = sortedUnits.map(u => {
      const ft = FORCE_TYPES[u.forceType];
      const abilityList = u.abilities.length > 0 ? u.abilities.join(', ') : '—';
      const tags = [];
      if (u.isCommander) tags.push(u.commanderType);
      if (u.isSpecialAsset) tags.push(ASSET_TYPES[u.assetType].label);

      return `
        <tr class="${u.isCommander ? 'commander-row' : ''}">
          <td class="unit-name-cell">
            <strong>${esc(u.name)}</strong>
            ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
            <div class="unit-models">${u.isCommander ? '' : ft.label + ' \xd7' + u.models + '\u00a0(Force\u00a0' + (ft.force * u.models) + ')'}</div>
          </td>
          <td class="stat-cell">${statBox(u)}</td>
          <td>${abilityList}</td>
          <td class="pts-cell">${unitCost(u)}pts</td>
        </tr>`;
    }).join('');

    return `
      <div class="company-block">
        <div class="company-header">
          <span class="company-name">${esc(company.name)}</span>
          <span class="company-meta">${typeName !== 'Standard' ? typeName + '\u00a0\xb7\u00a0' : ''}${compPts}pts</span>
        </div>
        <table class="roster-table">
          <thead><tr><th>Unit</th><th>Stats</th><th>Abilities</th><th>Pts</th></tr></thead>
          <tbody>${unitRows}</tbody>
        </table>
      </div>`;
    }).join('');
    return [regHeader, ...blocks];
  });
  const companyBlocksHtml = companyBlocks.join('');

  // Build ability glossary from abilities used in this army
  const abilityGlossaryRows = [...allAbilityNames].sort().map(name => {
    const ab = ABILITIES.find(a => a.name === name);
    if (!ab) return '';
    return `<tr><td class="ab-name">${name}</td><td>${ab.desc}</td></tr>`;
  }).join('');

  const abilityGlossary = allAbilityNames.size > 0 ? `
    <div class="glossary-block">
      <div class="glossary-header">Special Abilities</div>
      <table>
        <thead><tr><th>Ability</th><th>Rule</th></tr></thead>
        <tbody>${abilityGlossaryRows}</tbody>
      </table>
    </div>` : '';

  const html = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>${armyName} \u2014 Roster</title>
<style>
  body{font-family:Georgia,serif;font-size:10pt;color:black;background:white;margin:1.5cm;}
  h1{font-size:18pt;margin:0 0 2pt;}
  .subtitle{font-size:10pt;color:#555;margin-bottom:16pt;}
  .company-block{margin-bottom:16pt;break-inside:avoid;}
  .company-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid black;padding-bottom:3pt;margin-bottom:4pt;}
  .company-name{font-size:12pt;font-weight:bold;}
  .company-meta{font-size:9pt;color:#555;}
  table{width:100%;border-collapse:collapse;font-size:9pt;}
  th{background:#eee;text-align:left;padding:3pt 5pt;border:1px solid #ccc;font-size:8pt;text-transform:uppercase;letter-spacing:0.05em;}
  td{padding:3pt 5pt;border:1px solid #ddd;vertical-align:top;}
  .commander-row td{background:#f5f5f5;}
  .unit-name-cell strong{font-size:10pt;}
  .strength-stats{font-size:8pt;color:#444;}
  .tag{font-size:7pt;border:1px solid #999;padding:0 3pt;margin-left:4pt;vertical-align:middle;}
  .pts-cell{text-align:right;white-space:nowrap;font-weight:bold;}
  .total{text-align:right;font-size:11pt;font-weight:bold;margin-top:8pt;border-top:2px solid black;padding-top:4pt;}
  .unit-models{font-size:8pt;color:#555;margin-top:2pt;}
  .stat-cell{padding:2pt 4pt;}
  .stat-grid{border-collapse:collapse;font-size:9pt;}
  .stat-grid tr td{border:1px solid #bbb;text-align:center;padding:2pt 4pt;min-width:28pt;line-height:1.2;}
  .sb-zero{color:#bbb;}
  .sb-lbl{font-size:6.5pt;text-transform:uppercase;letter-spacing:0.04em;display:block;color:#666;}
  .glossary-block{margin-top:24pt;break-before:auto;}
  .glossary-header{font-size:12pt;font-weight:bold;border-bottom:2px solid black;padding-bottom:3pt;margin-bottom:4pt;}
  .ab-name{font-weight:bold;white-space:nowrap;width:1%;}
  @media print{body{margin:1cm;}}
</style>
</head><body>
<h1>${armyName}</h1>
<div class="subtitle">Total: ${total}pts \xb7 ${state.companies.length} compan${state.companies.length === 1 ? 'y' : 'ies'}</div>
${companyBlocksHtml}
<div class="total">Army Total: ${total}pts</div>
${abilityGlossary}
</body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 300);
}

<h2>I · Core Concepts</h2>
<p>Ashen Empires is a tabletop wargame for two players fought with miniature models. Armies are structured into Companies and Regiments, commanded through a layered hierarchy.</p>
<p>Battles are decided by <strong>shock</strong> — the accumulation of fatigue, disruption, and fear — as much as by outright casualties. A heavily shocked unit may have models still standing, but its will to fight is crumbling.</p>

<h3>Rule Zero</h3>
<p>When a rule contradicts itself or an edge case arises, agree on the most sensible interpretation and note it. The goal is a good game, not a perfect rulebook.</p>

<h3>1.1 Dice</h3>
<p>The game uses two dice mechanics:</p>
<ul>
<li><strong>Dice pools:</strong> roll a number of d6 equal to a stat. Each die is compared to a target number — determined by the attacker's Strength vs. the target's Defense. Dice that meet the target number inflict shock.</li>
<li><strong>2d6 tests:</strong> roll two dice, add a stat, and beat a target number. Used for Command and Courage tests.</li>
</ul>
<p>Both types are always stated explicitly in the rules.</p>

<h3>1.2 Shock</h3>
<p>Shock is the sole damage currency in Ashen Empires. It is tracked per unit on its leader model using tokens or a dial. Shock degrades command reliability, triggers morale crises, and ultimately destroys units. Shock is not automatically removed — Rally orders and round-end recovery are required.</p>
<p>Each die that meets the target number in combat inflicts shock directly. Units do not lose models during battle. They stand at full strength until a failed Courage Test Breaks them entirely.</p>

<h3>Leader Model</h3>
<p>Every unit has one uniquely identifiable leader model. All measurements (range, command distance, line of sight) are taken from this model. Shock is tracked on it.</p>

<table class="rule-table">

<tr><td>2d6 tests</td><td>Command and Courage — roll 2d6 + stat and beat a target number</td></tr>
<tr><td>Units</td><td>Do not lose models during battle — shock is the only damage currency</td></tr>
<tr><td>All measurements</td><td>Taken from the leader model</td></tr>

<tr><td>Courage Test</td><td>2d6 + Courage vs. current shock; Failure = Retreat; half or lower = Breaks and destroyed</td></tr>
<tr><td>Double 1s</td><td>Always fail Courage Tests regardless of modifiers</td></tr>
<tr><td>Commander bonus</td><td>Attached Commander adds Courage to unit's test if their stat equals or exceeds the unit's</td></tr>
</table>

turns: `
<h2>V · Turn Structure</h2>
<p>The game is played in Rounds of alternating Turns. On your Turn, select a unit, test to activate it, and execute resulting actions.</p>

<h3>5.1 The Turn Sequence</h3>
<ol>
<li><strong>Select a Unit</strong> — Choose any unit in your force. Exhausted units cannot be selected except to issue a Retreat order.</li>
<li><strong>Make a Command Test</strong> — Roll 2d6 + Courage vs. the unit's current shock. If the total beats shock: success. If not: the unit gains an <strong>Exhausted</strong> token, cannot act this round (except Retreat), and the turn passes immediately to your opponent.</li>
<li><strong>Activation</strong> — On success, the unit activates. Commanders also activate up to 2 subordinates within 12". Subordinate Captains must make their own Command Test for their own subordinates. Successful Commanders gain +1 shock.</li>
<li><strong>Declare All Orders</strong> — All activated units declare their orders simultaneously before any unit begins acting. Orders cannot be changed once declared.</li>
<li><strong>Execute: Movement</strong> — All activated units move. No shooting or melee until all movement is complete.</li>
<li><strong>Execute: Shooting</strong> — All activated units with shooting orders resolve them. No melee until all shooting resolves.</li>
<li><strong>Execute: Melee</strong> — All melee combats resolve simultaneously.</li>
</ol>
<p><em>Sequence is fixed:</em> All movement must complete before any shooting begins. All shooting must complete before any melee begins. This cannot be altered by any order or ability.</p>
<p><em>Maximum activations per Turn:</em> 1 General + 2 Captains + 4 non-Commanders = <strong>7 units maximum</strong>.</p>

<h3>5.2 Activation by Unit Type</h3>
<table class="rule-table">
<tr><th>Unit Type</th><th>On Success</th></tr>
<tr><td>Non-Commander</td><td>Only that unit activates.</td></tr>
<tr><td>Captain</td><td>The Captain plus up to 2 subordinates within 12" activate.</td></tr>
<tr><td>General</td><td>The General plus up to 2 subordinates (Captains or units) activate.</td></tr>
<tr><td>Subordinate Captain</td><td>Must make their own Command Test. Success: activates up to 2 of their subordinates. Failure: gains Exhausted. Other activations unaffected.</td></tr>
</table>

<h3>5.3 Round End</h3>
<p>When both players consecutively pass — choosing not to activate any unit — the Round ends.</p>
<ul>
<li>Remove all Exhausted tokens from all units.</li>
<li>All Commanders remove 2 shock.</li>
</ul>

<table class="rule-table">
<tr><th colspan="2">Summary</th></tr>
<tr><td>Each Turn</td><td>Select unit → Command Test (2d6 + Courage vs. shock) → activate</td></tr>
<tr><td>Sequence</td><td>All Movement → all Shooting → all Melee (fixed, cannot be changed)</td></tr>
<tr><td>Failed test</td><td>Exhausted token; unit cannot act this Round except Retreat</td></tr>
<tr><td>Commanders</td><td>Activate up to 2 subordinates within 12"; gain +1 shock on success</td></tr>
<tr><td>Round end</td><td>Both players pass consecutively; Exhausted tokens removed; Commanders −2 shock</td></tr>
</table>
`,

actions: `
<h2>VI · Actions &amp; Movement</h2>
<p>Each activated unit receives exactly one order. All orders are declared before any unit acts.</p>

<h3>6.1 Orders</h3>
<table class="rule-table">
<tr><th>Order</th><th>Effect</th></tr>
<tr><td><strong>ATTACK</strong></td><td>Shoot at a target in range and line of sight, or Fight if in base contact with an enemy.</td></tr>
<tr><td><strong>MANEUVER</strong></td><td>Move, rolling 2d6 + Move (in inches) for distance.</td></tr>
<tr><td><strong>REPOSITION</strong></td><td>Move up to 1d6" (max 6"), then Shoot at −2 Shoot Dice penalty.</td></tr>
<tr><td><strong>CHARGE</strong></td><td>Leader takes 1 shock. Move full Move + 2d6" toward a declared enemy, ending in base contact. See Ch. VIII.</td></tr>
<tr><td><strong>RETREAT</strong></td><td>Free action — no Command Test required. Leader takes 1 shock, moves full Move + 2d6" away from all visible enemies. If unable to move away: unit is destroyed. Units in melee may Retreat, taking 1 shock to break contact.</td></tr>
<tr><td><strong>RALLY</strong></td><td>Remove 1d6 shock from a subordinate unit or Commander within 12". If part of a group activation, may Rally then take one additional non-Rally order.</td></tr>
</table>
<p><em>Retreat is always available</em> to any unit at any time — it requires no Command Test. This is the only action available to Exhausted units.</p>

<h3>6.2 Movement Procedure</h3>
<ol>
<li>Measure and move the <strong>leader model</strong> first.</li>
<li>All other models maintain <strong>Unit Coherency</strong>: a chain of same-unit models with gaps no greater than 1".</li>
<li>Models may not be placed within 1" of enemy models (except when Charging).</li>
</ol>

<h3>6.3 Terrain</h3>
<p><strong>Difficult Terrain</strong> (woods, rough ground, walls, streams, hills, rubble) reduces movement by <strong>3" per terrain piece crossed</strong> during the move.</p>

<h3>6.4 Line of Sight &amp; Cover</h3>
<p>Draw an imaginary line from the attacking model to any part of the target model.</p>
<ul>
<li><strong>Friendly models</strong> (own unit and other friendlies) block line of sight.</li>
<li><strong>Enemy models</strong> block line of sight to targets behind them.</li>
<li><strong>Woods:</strong> may be seen into but not through to the opposite side. Models touching woods count as having obscured bases when targeted by models not touching the same terrain.</li>
<li><strong>Walls:</strong> block LoS entirely except through doors, windows, or low sections.</li>
<li><strong>Giants</strong> may shoot and be shot over non-Giant units.</li>
</ul>
<p><strong>Cover</strong> applies when attackers cannot see the target's entire base.</p>
<ul>
<li>Soft Cover (woods, brush): +1 Defense vs shooting.</li>
<li>Hard Cover (stone walls, ruins): +2 Defense vs shooting.</li>
<li>Giant units cannot claim cover bonuses.</li>
</ul>

<h3>Facing &amp; Arcs</h3>
<p>Model facing is determined by the direction the leader model's head is pointing. The <strong>front arc</strong> is the forward 180°; the <strong>rear arc</strong> is the rear 180°. Rear arc charge rules apply when the charging unit's leader enters from the rear arc of the target's leader.</p>

<table class="rule-table">
<tr><th colspan="2">Summary</th></tr>
<tr><td>Movement</td><td>2d6 + Move inches; leader moves first; others maintain 1" coherency chain</td></tr>
<tr><td>Charge / Retreat</td><td>Both cost 1 shock to leader; Retreat requires no Command Test</td></tr>
<tr><td>Rally</td><td>Removes 1d6 shock from subordinate within 12"</td></tr>
<tr><td>Difficult terrain</td><td>−3" per piece crossed</td></tr>
<tr><td>Cover</td><td>Soft +1 Defense vs shooting; Hard +2 Defense vs shooting; Giants immune</td></tr>
</table>
`,

shooting: `
<h2>VII · Shooting</h2>
<p>A unit may shoot if it has both a Shoot Dice stat and a Range stat. All shooting resolves after all movement and before any melee. Units currently in melee combat may not be targeted.</p>

<h3>7.1 Line of Sight</h3>
<ul>
<li><strong>Friendly models</strong> (own unit and other friendlies) block line of sight.</li>
<li><strong>Enemy models</strong> block line of sight to targets behind them.</li>
<li><strong>Woods:</strong> may be seen into but not through to the opposite side.</li>
<li><strong>Walls:</strong> block LoS entirely except through doors, windows, or low sections.</li>
<li><strong>Giants</strong> may shoot and be shot over non-Giant units.</li>
</ul>

<h3>7.2 Range Bands</h3>
<table class="rule-table">
<tr><th>Band</th><th>Distance</th><th>Dice Modifier</th></tr>
<tr><td>Short / Medium</td><td>Up to listed Range</td><td>None</td></tr>
<tr><td>Long</td><td>Up to 2× listed Range</td><td>Shoot Dice ÷ 2 (round up)</td></tr>
<tr><td>Out of Range</td><td>Beyond 2× listed Range</td><td>Cannot shoot</td></tr>
</table>

<h3>7.3 Shoot Dice Procedure</h3>
<ol>
<li><strong>Assemble Dice Pool</strong> — Start with dice equal to the unit's Shoot Dice stat. At long range, halve the pool (round up). +1 die if 4+ models in the shooting unit have LoS (+2 if 8+ models). +1 die if the target has 4+ models (+2 if 8+ models).</li>
<li><strong>Roll for Shock</strong> — Roll all dice. The target number is set by Shoot Strength vs. target Defense (see table). Each die that meets the target number inflicts <strong>1 shock</strong> on the target.</li>
</ol>

<h3>7.4 Target Number</h3>
<table class="rule-table">
<tr><th>Shoot Strength vs. Defense</th><th>Target Number</th></tr>
<tr><td>Shoot Strength 2+ higher than Defense</td><td>3+</td></tr>
<tr><td>Within 1 either direction</td><td>4+</td></tr>
<tr><td>Defense 2+ higher than Shoot Strength</td><td>5+</td></tr>
</table>

<h3>7.5 Cover</h3>
<p>Cover requires that attackers cannot see the target's entire base. <strong>Soft Cover</strong> (woods, brush): +1 Defense vs shooting. <strong>Hard Cover</strong> (stone walls, ruins): +2 Defense vs shooting. Giant units cannot claim cover.</p>

<p><em>Example:</em> A 6-model unit (Shoot Dice 4, Shoot Strength 2) fires at a 5-model unit (Defense 2) at medium range. Pool: 4 base + 1 (4+ shooters with LoS) + 1 (target 4+ models) = 6 dice. Strength equals Defense, target number is 4+. Rolls 6,5,3,2,4,1 → four dice meet 4+ → target takes 4 shock.</p>

<table class="rule-table">
<tr><th colspan="2">Summary</th></tr>
<tr><td>Requirements</td><td>Must have both Shoot Dice stat and Range stat</td></tr>
<tr><td>Dice pool</td><td>Shoot Dice stat; halved (round up) at long range; bonuses for large units on either side</td></tr>
<tr><td>Target number</td><td>Shoot Strength vs. Defense: 2+ advantage = 3+, within 1 = 4+, 2+ disadvantage = 5+</td></tr>
<tr><td>Result</td><td>Each die meeting target number = 1 shock on target</td></tr>
<tr><td>Sequence</td><td>All shooting resolves after movement and before any melee</td></tr>
</table>
`,

melee: `
<h2>VIII · Charging &amp; Melee</h2>
<p>Melee is decisive and costly. All melee begins only after all shooting in the current Turn is fully resolved.</p>

<h3>8.1 Charging</h3>
<ol>
<li><strong>Declare Target</strong> — Name the enemy unit before rolling movement.</li>
<li><strong>Take Shock</strong> — The charging leader takes 1 shock.</li>
<li><strong>Move</strong> — Move full Move + 2d6" toward the target, ending in base contact with an enemy model.</li>
<li><strong>Place Remaining Models</strong> — Models that can reach base contact in straight lines from their starting positions contribute their full Force to the combat. Remaining models are placed anywhere within unit coherency.</li>
<li><strong>Courage Test</strong> — Target must pass (2d6 + Courage vs. current shock) or immediately Retreat. If they Retreat, the charger may charge again — taking another 1 shock.</li>
</ol>
<p><em>Counter-Shooting:</em> If the charging unit moved more than 10" and the target passes their Courage Test, the target may shoot at the charger before melee resolves.</p>

<h3>8.2 Melee Procedure</h3>
<p>Both sides resolve simultaneously — neither acts before the other.</p>
<ol>
<li><strong>Assemble Dice Pool</strong> — Start with Fight Dice stat dice. Apply modifiers from the table below.</li>
<li><strong>Roll for Shock</strong> — Both sides roll simultaneously. The target number is set by Fight Strength vs. target Defense (see table). Each die that meets the target number inflicts <strong>1 shock</strong> on the target.</li>
<li><strong>Determine Winner</strong> — Compare total shock inflicted by each side. More shock = winner. The loser makes a Courage Test.</li>
</ol>

<h3>8.3 Target Number</h3>
<table class="rule-table">
<tr><th>Fight Strength vs. Defense</th><th>Target Number</th></tr>
<tr><td>Fight Strength 2+ higher than Defense</td><td>3+</td></tr>
<tr><td>Within 1 either direction</td><td>4+</td></tr>
<tr><td>Defense 2+ higher than Fight Strength</td><td>5+</td></tr>
</table>

<h3>8.4 Melee Modifiers</h3>
<table class="rule-table">
<tr><th>Condition</th><th>Dice Bonus</th></tr>
<tr><td>Higher Force in contact than enemy</td><td>+1 die (doubled Force = +2, tripled = +3)</td></tr>
<tr><td>Enemy has 3+ more shock than you</td><td>+1 die (6+ shock diff = +2, 9+ = +3, 12+ = +4)</td></tr>
<tr><td>Charge distance bonus</td><td>+1 die per full 5" charged (charge bonuses capped at +4 dice total)</td></tr>
<tr><td>Defending vs. difficult terrain charge</td><td>+2 dice (defender only)</td></tr>
<tr><td>Charged from rear arc</td><td>Halve your total dice (round up)</td></tr>
</table>
<p><em>Force in Contact:</em> When charging, count each model's full Force value. In ongoing melee (already in contact at the start of the Turn), all models count as Force 1 regardless of type. Only models in base contact with the enemy, or in base contact with friendly models already in contact, contribute Force.</p>

<h3>8.5 Courage Test — Combat Loser</h3>
<p>Roll <strong>2d6 + Courage</strong> vs. the unit's current shock. <strong>Double 1s always fail.</strong></p>
<table class="rule-table">
<tr><th>Result</th><th>Outcome</th></tr>
<tr><td>Total beats shock</td><td>Unit stands and continues fighting.</td></tr>
<tr><td>Failure</td><td>Unit gains 1 shock and Retreats. Winner may pursue.</td></tr>
<tr><td>Result is half or lower than current shock</td><td>Unit Breaks and is destroyed.</td></tr>
<tr><td>Double 1s</td><td>Automatic failure regardless of other modifiers.</td></tr>
</table>

<h3>8.6 Ongoing Melee &amp; Multiple Units</h3>
<ul>
<li>Units remaining in contact continue fighting in subsequent Turns. A unit may Retreat from melee — taking 1 shock to break contact.</li>
<li>Add Fight Dice of all friendly units in contact with the same enemy target (unless those units are also touching a different enemy). Defender allocates received shock among their engaged units (minimum 1 per unit if possible).</li>
</ul>

<table class="rule-table">
<tr><th colspan="2">Summary</th></tr>
<tr><td>Charging</td><td>Declare target → take 1 shock → move into contact → target tests Courage or Retreats</td></tr>
<tr><td>Counter-shooting</td><td>If charge covered 10"+ and target passes Courage, they may shoot first</td></tr>
<tr><td>Melee</td><td>Both sides roll Fight Dice; target number set by Fight Strength vs. Defense</td></tr>
<tr><td>Winner</td><td>Side that inflicted more shock; loser makes a Courage Test</td></tr>
<tr><td>Loser result</td><td>Fail = Retreat + 1 shock; half or lower than current shock = Breaks and destroyed</td></tr>
</table>
`,
